name: Backend Build and Deploy (Azure Web App)

on:
  push:
    branches:
      - main
    paths:
      - 'dietiestates2025-back/**'
      - '.github/workflows/backend-azure-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build backend JAR
        working-directory: dietiestates2025-back
        run: ./mvnw -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: dietiestates2025-back/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2C0C2BCFC053415D8BFF5DECC11394CE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_108A30994ED440D8AAE4C79EB7A3B0AA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F325D20F2C54437EA0D8CE9F4A67FFAD }}

      - name: Deploy backend to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DietiEstates2025BackendV2'
          slot-name: 'Production'
          package: '*.jar'
